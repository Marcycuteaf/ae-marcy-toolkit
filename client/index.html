<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MARCY</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
    <div class="app">
        <header class="topbar">
            <span class="brand">MARCY</span>
        </header>

        <section class="card">
            <h2>Text &amp; FX</h2>
            <div class="grid g3">
                <button class="btn" data-fn="text" data-a="BebasNeue-Regular" data-b="EXAMPLE MARCY" data-c="100">EN</button>
                <button class="btn" data-fn="text" data-a="VDL-LogoJrBlack" data-b="文字見本" data-c="100">JP</button>
                <button class="btn" data-fn="text" data-a="Arial-ItalicMT" data-b="example marcy" data-c="80">SUB</button>
            </div>
            <div class="grid g4">
                <button class="btn" data-fn="fx" data-a="Fill">Fill</button>
                <button class="btn" data-fn="fx" data-a="Gradient">Grad</button>
                <button class="btn" data-fn="fx" data-a="Box">Box</button>
                <button class="btn" data-fn="fx" data-a="Clean">Clean</button>
            </div>
        </section>

        <section class="card">
            <h2>Align &amp; Anchor</h2>
            <div class="split">
                <div class="col-area">
                    <select id="alignTo" class="select">
                        <option value="sel">對齊選取</option>
                        <option value="comp">對齊合成</option>
                    </select>
                    <div class="grid g3">
                        <button class="btn sm" data-fn="align" data-a="left">左</button>
                        <button class="btn sm" data-fn="align" data-a="hCenter">中</button>
                        <button class="btn sm" data-fn="align" data-a="right">右</button>
                        <button class="btn sm" data-fn="align" data-a="top">上</button>
                        <button class="btn sm" data-fn="align" data-a="vCenter">中</button>
                        <button class="btn sm" data-fn="align" data-a="bottom">下</button>
                    </div>
                    <div class="grid g2">
                        <button class="btn sm" data-fn="dist" data-a="H">H 分佈</button>
                        <button class="btn sm" data-fn="dist" data-a="V">V 分佈</button>
                    </div>
                </div>
                <div class="col-area">
                    <span class="lbl">Anchor</span>
                    <div class="grid g3">
                        <button class="btn sq" data-fn="anchor" data-a="TL">TL</button>
                        <button class="btn sq" data-fn="anchor" data-a="TM">T</button>
                        <button class="btn sq" data-fn="anchor" data-a="TR">TR</button>
                        <button class="btn sq" data-fn="anchor" data-a="ML">L</button>
                        <button class="btn sq" data-fn="anchor" data-a="MM">C</button>
                        <button class="btn sq" data-fn="anchor" data-a="MR">R</button>
                        <button class="btn sq" data-fn="anchor" data-a="BL">BL</button>
                        <button class="btn sq" data-fn="anchor" data-a="BM">B</button>
                        <button class="btn sq" data-fn="anchor" data-a="BR">BR</button>
                    </div>
                    <span class="lbl">Para</span>
                    <div class="grid g3">
                        <button class="btn sq" data-fn="para" data-a="left">L</button>
                        <button class="btn sq" data-fn="para" data-a="center">C</button>
                        <button class="btn sq" data-fn="para" data-a="right">R</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Tools</h2>
            <div class="opts">
                <label class="opt">
                    <span>Color</span>
                    <select id="colorIdx" class="select">
                        <option value="0">None</option>
                        <option value="1">Red</option>
                        <option value="2">Yellow</option>
                        <option value="3">Orange</option>
                        <option value="4">Brown</option>
                        <option value="5">Green</option>
                        <option value="6">Blue</option>
                        <option value="7">Violet</option>
                        <option value="8">Fuchsia</option>
                    </select>
                </label>
                <label class="opt">
                    <span>Qty</span>
                    <select id="qty" class="select">
                        <option>1</option><option>2</option><option>3</option>
                        <option>4</option><option>5</option><option>6</option>
                        <option>7</option><option>8</option><option>9</option><option>10</option>
                    </select>
                </label>
                <label class="opt check">
                    <input type="checkbox" id="sep" checked />
                    <span>分別預合成</span>
                </label>
                <label class="opt check">
                    <input type="checkbox" id="singleMode" checked />
                    <span>單一/合併</span>
                </label>
            </div>
            <div class="grid g4">
                <button class="btn" data-fn="precomp">Pre-C</button>
                <button class="btn" data-fn="null">Null</button>
                <button class="btn" data-fn="adj">Adj</button>
                <button class="btn" data-fn="sepxy">Sep XY</button>
            </div>
            <div class="grid g4">
                <button class="btn" data-fn="solid">Solid</button>
                <button class="btn" data-fn="camera">Cam</button>
                <button class="btn" data-fn="light">Light</button>
                <button class="btn" data-fn="crop">Crop</button>
            </div>
            <div class="grid g2">
                <button class="btn" data-fn="inpoint">In [</button>
                <button class="btn" data-fn="outpoint">Out ]</button>
            </div>
        </section>

        <footer class="statusbar">
            <span id="status">準備就緒</span>
        </footer>
    </div>

    <script src="./js/lib/CSInterface.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
